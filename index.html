    <script type="application/ld+json">

        {
          "@type": "Question",
          "name": "How many humanoid robot companies are there?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "As of 2026, Humanoid Atlas tracks 29+ major humanoid robot OEMs globally, including Tesla (Optimus), Figure (02/03), 1X Technologies (NEO), Unitree (G1/H1), Agility Robotics (Digit), Boston Dynamics (Atlas), Apptronik (Apollo), Sanctuary AI (Phoenix), NEURA Robotics (4NE-1), Fourier (GR-2), XPeng (Iron), UBTech (Walker S2), and others across the US, China, Europe, and India."
          }
        },
        {
          "@type": "Question",
          "name": "What are the key components in a humanoid robot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Key humanoid robot components include BLDC motors, harmonic reducers, rotary and linear actuators, planetary roller screws, batteries, compute modules (NVIDIA Jetson, custom SoCs), cameras and depth sensors, tactile sensors, encoders, end effectors (dexterous hands), and PCBs. Humanoid Atlas tracks 41+ suppliers across 10 hardware component categories."
          }
        },
        {
          "@type": "Question",
          "name": "What is the humanoid robot supply chain?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The humanoid robot supply chain flows from raw material providers through component suppliers (motors, reducers, sensors, batteries, compute) to OEM manufacturers who assemble the final robots. Key supply chain bottlenecks include harmonic reducers, planetary roller screws, and high-precision bearings. Humanoid Atlas maps the complete supplier-to-OEM relationship network with geopolitical dependency analysis."
          }
        },
        {
          "@type": "Question",
          "name": "What are VLA models in robotics?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vision-Language-Action (VLA) models are AI systems that unify visual perception, language understanding, and robot control into a single model. Major VLAs include NVIDIA GR00T N1, Physical Intelligence pi0, OpenVLA, Google DeepMind Gemini Robotics, and Figure Helix. Humanoid Atlas tracks 19 VLA models with their OEM integrations and technical specifications."
          }
        },
        {
          "@type": "Question",
          "name": "What are world models in robotics?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "World models learn to simulate how the physical world evolves in response to robot actions, enabling robots to practice tasks in imagination before acting in reality. Categories include video generation models (DreamDojo, 1X World Model), latent dynamics models (V-JEPA 2, Field AI), RL/imagination agents (Dreamer V4), and foundation platforms (NVIDIA Cosmos). Humanoid Atlas tracks 19 world models."
          }
        }
      ]
    }
    </script>
